apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-processor
  namespace: logsprocessor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-processor
  template:
    metadata:
      labels:
        app: log-processor
    spec:
      serviceAccountName: processor-sa
      containers:
      - name: log-processor
        image: yash2505/logsprocessor:IMAGE_TAG
        imagePullPolicy: Always
        env:
        - name: RECEIVER_URL
          valueFrom:      
            configMapKeyRef:
              name: my-config
              key: receiverUrl
        ports:
        - containerPort: 5001