apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-viewer
  namespace: logsviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-viewer
  template:
    metadata:
      labels:
        app: log-viewer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: viewer-sa
      containers:
      - name: log-viewer
        image: yash2505/logsviewer:IMAGE_TAG
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        env:
        - name: PROCESSOR_URL
          valueFrom:
            configMapKeyRef:
              name: my-config
              key: processorUrl
        - name: RECEIVER_URL
          valueFrom:      
            configMapKeyRef:
              name: my-config
              key: receiverUrl
        ports:
        - containerPort: 5002 