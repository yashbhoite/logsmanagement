name: CI/CD for Logs Management Services

on:
  push:
    branches:
      - master
    paths:
      - 'logsviewer/**'
      - 'logsgenerator/**'
      - 'logsprocessor/**'
  workflow_dispatch:

jobs:
  # -------------------
  # Build & Push Images (Parallel)
  # -------------------
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        service:
          - logsviewer
          - logsgenerator
          - logsprocessor
    name: Build & Push ${{ matrix.service }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t yash2505/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Push Docker Image
        run: |
          docker push yash2505/${{ matrix.service }}:${{ github.sha }}

  # -------------------
  # Deploy Updated Services
  # -------------------
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Update Deployment Image Tags
        run: |
          # Replace IMAGE_TAG placeholder in all deployment YAMLs with the new image tag
          find . -name "*.yml" -exec sed -i "s|IMAGE_TAG|${{ github.sha }}|g" {} \;

      - name: Apply Kubernetes Resources
        run: |
          # Apply each service folder separately
          kubectl apply -f logsgenerator/
          kubectl apply -f logsprocessor/
          kubectl apply -f logsviewer/
          kubectl apply -f logs-ingress.yaml
          kubectl apply -f configmap.yaml
          kubectl apply -f namespaces.yml