name: Build and Push Viewer Image

on:
  push:
    paths:
      - 'logsviewer/**'
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t yash2505/logsviewer:${{ github.sha }} ./log-viewer

    - name: Push Image
      run: |
        docker push yash2505/logsviewer:${{ github.sha }}