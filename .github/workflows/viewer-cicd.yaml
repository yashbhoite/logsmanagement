name: Build and Push Images

on:
  push:
    branches:
      - master
    paths:
      - 'logsviewer/**'
      - 'logsgenerator/**'
      - 'logsprocessor/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - logsviewer
          - logsgenerator
          - logsprocessor

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t yash2505/${{ matrix.service }}:${{ github.sha }} \
            ./${{ matrix.service }}

      - name: Push Image
        run: |
          docker push yash2505/${{ matrix.service }}:${{ github.sha }}